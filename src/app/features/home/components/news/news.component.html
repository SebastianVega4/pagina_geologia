<section class="pt-32 pb-24 bg-white dark:bg-brand-dark transition-colors duration-300 overflow-hidden">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-6" data-aos="fade-right">
            <div class="max-w-xl">
                <h2 class="text-brand-secondary font-bold tracking-widest uppercase text-sm mb-4">Actualidad
                    Geocientífica</h2>
                <h3
                    class="text-3xl md:text-5xl font-extrabold text-brand-primary dark:text-white leading-tight underline decoration-brand-secondary/30">
                    Noticias del Evento</h3>
            </div>
            <a href="#"
                class="group flex items-center gap-2 text-brand-secondary font-bold hover:translate-x-2 transition-transform">
                Explorar todo el blog <lucide-angular [img]="icons.ArrowRight" class="w-5 h-5"></lucide-angular>
            </a>
        </div>

        <!-- News Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <article *ngFor="let n of noticias$ | async; let i = index"
                class="flex flex-col bg-brand-light dark:bg-brand-primary rounded-3xl overflow-hidden border border-gray-100 dark:border-white/5 hover:shadow-2xl hover:shadow-brand-secondary/5 transition-all duration-500"
                data-aos="fade-up" [attr.data-aos-delay]="i * 150">

                <!-- News Image with Skeleton Placeholder base -->
                <div class="relative h-64 overflow-hidden bg-gray-200 dark:bg-gray-800">
                    <img [src]="n.imagen_url" [alt]="n.titulo"
                        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">

                    <!-- Date Badge -->
                    <div
                        class="absolute top-6 left-6 px-4 py-2 bg-white/90 dark:bg-brand-dark/90 backdrop-blur-md rounded-xl shadow-lg border border-white/20">
                        <div
                            class="flex items-center gap-2 text-brand-primary dark:text-white font-bold text-xs uppercase tracking-tighter">
                            <lucide-angular [img]="icons.Calendar"
                                class="w-3.5 h-3.5 text-brand-secondary"></lucide-angular>
                            {{ n.fecha | date:'MMM d, y' }}
                        </div>
                    </div>
                </div>

                <!-- News Body -->
                <div class="p-8 flex-grow space-y-4">
                    <h4 class="text-xl font-extrabold text-brand-primary dark:text-white leading-tight">
                        {{ n.titulo }}
                    </h4>
                    <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed line-clamp-3">
                        {{ n.resumen }}
                    </p>
                </div>

                <!-- Newsletter-style footer -->
                <div class="px-8 pb-8 pt-2">
                    <a [routerLink]="['/noticias', n.id]"
                        class="flex items-center gap-2 text-brand-secondary font-bold text-sm uppercase tracking-widest group-hover:gap-3 transition-all cursor-pointer">
                        Leer noticia completa <lucide-angular [img]="icons.ArrowRight" class="w-4 h-4"></lucide-angular>
                    </a>
                </div>
            </article>
        </div>

    </div>
</section>
