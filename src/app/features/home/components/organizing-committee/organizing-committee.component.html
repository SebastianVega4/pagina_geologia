<section class="py-20 bg-white dark:bg-brand-dark transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">

        <div class="mb-12">
            <h2 class="text-brand-secondary font-bold tracking-[0.3em] uppercase text-[10px] mb-4">
                Compromiso Académico</h2>
            <h3 class="text-2xl font-extrabold text-brand-primary dark:text-gray-300 italic uppercase">
                Comité Organizador
            </h3>
        </div>

        <!-- Members Grid (Mirroring Sponsors Style) -->
        <div
            class="flex flex-wrap items-center justify-center gap-12 md:gap-20 py-8 grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-700">
            <div *ngFor="let m of members" class="group relative flex flex-col items-center">
                <!-- Logo Container -->
                <div class="h-16 md:h-24 w-32 md:w-48 flex items-center justify-center p-4">
                    <img [src]="m.logo" [alt]="m.name"
                        class="max-h-full max-w-full object-contain transform group-hover:scale-110 transition-transform duration-500">
                </div>

                <!-- Tooltip or label on hover -->
                <span
                    class="absolute -bottom-4 left-1/2 -translate-x-1/2 px-3 py-1 bg-brand-secondary text-white text-[10px] font-bold rounded-md opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all duration-300 shadow-lg whitespace-nowrap">
                    {{ m.name }}
                </span>
            </div>
        </div>

    </div>
</section>
