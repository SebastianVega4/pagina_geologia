<section class="py-20 bg-white dark:bg-brand-dark transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">

        <div class="mb-16">
            <h2 class="text-brand-secondary font-bold tracking-[0.3em] uppercase text-[10px] mb-4">
                Compromiso Académico</h2>
            <h3 class="text-3xl font-extrabold text-brand-primary dark:text-gray-300 italic uppercase">
                Comité Organizador
            </h3>
        </div>

        <!-- Docentes Section -->
        <div class="mb-20">
            <h4 class="text-xl font-bold text-brand-primary dark:text-gray-400 mb-10 uppercase tracking-wider">
                Comité de Docentes
            </h4>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-5xl mx-auto">
                <div *ngFor="let docente of docentes" class="flex flex-col items-center group">
                    <div class="relative mb-4 overflow-hidden rounded-xl shadow-lg aspect-[4/5] w-full max-w-[280px]">
                        <img [src]="docente.image" [alt]="docente.name"
                            class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-brand-primary/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-6">
                            <p class="text-white text-sm font-medium">{{ docente.role }}</p>
                        </div>
                    </div>
                    <h5 *ngIf="docente.name" class="text-lg font-bold text-brand-primary dark:text-gray-200">{{ docente.name }}</h5>
                    <p class="text-brand-secondary text-sm font-semibold uppercase tracking-tighter">{{ docente.role }}</p>
                </div>
            </div>
        </div>

        <!-- Estudiantes Section -->
        <div class="mb-20">
            <h4 class="text-xl font-bold text-brand-primary dark:text-gray-400 mb-10 uppercase tracking-wider">
                Comité de Estudiantes
            </h4>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                <div *ngFor="let estudiante of estudiantes" class="flex flex-col items-center group">
                    <div class="relative mb-4 overflow-hidden rounded-xl shadow-lg aspect-[4/5] w-full max-w-[260px]">
                        <img [src]="estudiante.image" [alt]="estudiante.name"
                            class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-brand-primary/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-6">
                            <p class="text-white text-sm font-medium">{{ estudiante.role }}</p>
                        </div>
                    </div>
                    <h5 *ngIf="estudiante.name" class="text-lg font-bold text-brand-primary dark:text-gray-200">{{ estudiante.name }}</h5>
                    <p class="text-brand-secondary text-sm font-semibold uppercase tracking-tighter">{{ estudiante.role }}</p>
                </div>
            </div>
        </div>

        <!-- Institutions Section (Original Logos) -->
        <div class="pt-12 border-t border-gray-100 dark:border-gray-800">
            <h4 class="text-xs font-bold text-gray-400 mb-8 uppercase tracking-[0.2em]">
                Instituciones que lideran
            </h4>
            <div
                class="flex flex-wrap items-center justify-center gap-12 md:gap-20 grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-700">
                <div *ngFor="let m of members" class="group relative flex flex-col items-center">
                    <div class="h-16 md:h-20 w-32 md:w-40 flex items-center justify-center p-2">
                        <img [src]="m.logo" [alt]="m.name"
                            class="max-h-full max-w-full object-contain transform group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <span
                        class="absolute -bottom-4 left-1/2 -translate-x-1/2 px-3 py-1 bg-brand-secondary text-white text-[10px] font-bold rounded-md opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all duration-300 shadow-lg whitespace-nowrap">
                        {{ m.name }}
                    </span>
                </div>
            </div>
        </div>

    </div>
</section>
