<section class="pt-32 pb-24 bg-brand-light dark:bg-brand-primary/20 transition-colors duration-300 overflow-hidden">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex flex-col md:flex-row md:items-center justify-between mb-16 gap-8">
            <div data-aos="fade-right">
                <h2 class="text-brand-secondary font-bold tracking-widest uppercase text-sm mb-4">Registro Visual</h2>
                <h3 class="text-3xl md:text-5xl font-extrabold text-brand-primary dark:text-white leading-tight">Galería
                    del Congreso</h3>
            </div>

            <!-- Tab Switcher -->
            <div class="inline-flex p-1.5 bg-white dark:bg-brand-primary rounded-2xl border border-gray-100 dark:border-white/5 shadow-sm"
                data-aos="fade-left">
                <button (click)="setTab('actual')"
                    [ngClass]="activeTab === 'actual' ? 'bg-brand-secondary text-white shadow-lg shadow-brand-secondary/20' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-brand-dark'"
                    class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-300">
                    <lucide-angular [img]="icons.Image" class="w-4 h-4"></lucide-angular>
                    Evento Actual
                </button>
                <button (click)="setTab('historica')"
                    [ngClass]="activeTab === 'historica' ? 'bg-brand-secondary text-white shadow-lg shadow-brand-secondary/20' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-brand-dark'"
                    class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-300">
                    <lucide-angular [img]="icons.History" class="w-4 h-4"></lucide-angular>
                    Memoria Histórica
                </button>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div class="columns-1 md:columns-2 lg:columns-3 gap-8 space-y-8">
            <div *ngFor="let item of filteredItems" (click)="openLightbox(item)"
                class="relative group rounded-[2rem] overflow-hidden break-inside-avoid shadow-lg border-2 border-white dark:border-brand-primary cursor-pointer hover:shadow-brand-secondary/20 transition-all"
                data-aos="fade-up">

                <!-- Skeleton logic placeholder is handled by CSS aspect-ratio and bg-gray -->
                <img [src]="item.url" [alt]="item.title"
                    class="w-full h-auto object-cover transform group-hover:scale-110 transition-transform duration-700 brightness-95 group-hover:brightness-100">

                <!-- Overlay on Hover -->
                <div
                    class="absolute inset-0 bg-gradient-to-t from-brand-primary/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-8">
                    <div class="translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                        <h4 class="text-white font-bold text-xl mb-1">{{ item.title }}</h4>
                        <div class="flex items-center gap-2 text-brand-secondary text-sm font-medium">
                            <lucide-angular [img]="icons.Maximize2" class="w-4 h-4"></lucide-angular>
                            Click para ampliar
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Lightbox Modal -->
    <div *ngIf="selectedItem" (click)="closeLightbox()"
        class="fixed inset-0 z-[100] bg-brand-dark/95 backdrop-blur-xl flex items-center justify-center p-4 md:p-12 animate-fade-in">

        <!-- Close Button -->
        <button (click)="closeLightbox()"
            class="absolute top-8 right-8 p-3 bg-white/10 hover:bg-brand-secondary text-white rounded-full transition-all hover:rotate-90 z-[110]">
            <lucide-angular [img]="icons.X" class="w-8 h-8"></lucide-angular>
        </button>

        <!-- Image Container -->
        <div class="relative max-w-5xl w-full h-full flex flex-col items-center justify-center gap-6"
            (click)="$event.stopPropagation()">
            <img [src]="selectedItem.url" [alt]="selectedItem.title"
                class="max-w-full max-h-[80vh] object-contain rounded-3xl shadow-2xl animate-scale-up border-4 border-white/10">

            <div class="text-center animate-fade-in-up">
                <h4 class="text-3xl font-black text-white mb-2">{{ selectedItem.title }}</h4>
                <p class="text-brand-secondary font-bold uppercase tracking-widest text-sm">
                    {{ selectedItem.category === 'actual' ? 'Evento Actual' : 'Memoria Histórica' }}
                </p>
            </div>
        </div>
    </div>
</section>
